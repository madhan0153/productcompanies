name: Scheduled Crons

# One routed job avoids misleading "This job was skipped" runs in GitHub's UI.
# Schedules are UTC:
#   digest                  Mon 02:30 UTC
#   recompute-matches       Daily 22:30 UTC / 04:00 IST
#   notify-matches          Daily 23:30 UTC / 05:00 IST (after recompute)
#   drain-background-jobs   Every 15 minutes

on:
  schedule:
    - cron: "30 2 * * 1"
    - cron: "30 22 * * *"
    - cron: "30 23 * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Which endpoint to hit manually"
        required: true
        default: "drain-background-jobs"
        type: choice
        options:
          - digest
          - recompute-matches
          - notify-matches
          - drain-background-jobs

permissions:
  contents: read

concurrency:
  group: scheduled-crons-${{ github.event.schedule || github.event.inputs.endpoint }}
  cancel-in-progress: false

jobs:
  run_scheduled_cron:
    name: "Run scheduled cron"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      EVENT_NAME: ${{ github.event_name }}
      EVENT_SCHEDULE: ${{ github.event.schedule }}
      INPUT_ENDPOINT: ${{ github.event.inputs.endpoint }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Resolve endpoint
        id: endpoint
        shell: bash
        run: |
          set -euo pipefail

          endpoint=""
          case "${EVENT_NAME}:${EVENT_SCHEDULE}" in
            "schedule:30 2 * * 1") endpoint="digest" ;;
            "schedule:30 22 * * *") endpoint="recompute-matches" ;;
            "schedule:30 23 * * *") endpoint="notify-matches" ;;
            "schedule:*/15 * * * *") endpoint="drain-background-jobs" ;;
            "workflow_dispatch:"*) endpoint="${INPUT_ENDPOINT}" ;;
          esac

          if [ -z "$endpoint" ]; then
            echo "::error::No endpoint mapping for event=${EVENT_NAME} schedule='${EVENT_SCHEDULE}' input='${INPUT_ENDPOINT}'"
            exit 1
          fi

          echo "endpoint=${endpoint}" >> "$GITHUB_OUTPUT"
          echo "Resolved endpoint: ${endpoint}"

      - name: Validate cron secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          [ -n "${APP_URL:-}" ] || missing+=("APP_URL")
          [ -n "${CRON_SECRET:-}" ] || missing+=("CRON_SECRET")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required Action secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Call cron endpoint
        shell: bash
        run: |
          set -euo pipefail

          endpoint="${{ steps.endpoint.outputs.endpoint }}"
          app_url="${APP_URL%/}"

          call_endpoint() {
            local path="$1"
            curl -sS -L --location-trusted -o /tmp/cron-resp.json -w "%{http_code}" \
              -X POST "${app_url}${path}" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 280
          }

          if [ "$endpoint" != "recompute-matches" ]; then
            http_code=$(call_endpoint "/api/cron/${endpoint}")
            cat /tmp/cron-resp.json; echo
            if [ "$http_code" != "200" ]; then
              echo "::error::${endpoint} returned HTTP ${http_code}"
              exit 1
            fi
            exit 0
          fi

          max_iter=30
          conflict_streak=0
          last_remaining=""
          for i in $(seq 1 "$max_iter"); do
            http_code=$(call_endpoint "/api/cron/recompute-matches")
            resp=$(cat /tmp/cron-resp.json)
            echo "iteration=${i} http=${http_code} ${resp}"

            if [ "$http_code" = "409" ]; then
              conflict_streak=$((conflict_streak + 1))
              if [ "$conflict_streak" -ge 3 ]; then
                echo "::error::recompute lock held for 3 consecutive attempts"
                exit 1
              fi
              sleep 60
              continue
            fi
            conflict_streak=0

            if [ "$http_code" != "200" ]; then
              echo "::error::recompute-matches returned HTTP ${http_code}"
              exit 1
            fi

            bailed=$(echo "$resp" | jq -r '.bailed_on_budget // false')
            processed=$(echo "$resp" | jq -r '.processed // 0')
            remaining=$(echo "$resp" | jq -r '.remaining // 0')
            eligible=$(echo "$resp" | jq -r '.eligible_total // .eligible_visible // 0')
            source=$(echo "$resp" | jq -r '.candidate_source // "unknown"')
            last_remaining="$remaining"

            echo "candidate_source=${source} eligible=${eligible} processed=${processed} remaining=${remaining} bailed=${bailed}"

            if [ "$bailed" != "true" ] && [ "$remaining" = "0" ]; then
              echo "Recompute fan-out complete."
              exit 0
            fi
            if [ "$processed" = "0" ]; then
              echo "::error::Recompute made no progress while remaining=${remaining}"
              exit 1
            fi

            sleep 5
          done

          echo "::error::Recompute did not drain after ${max_iter} iterations; remaining=${last_remaining}"
          exit 1
