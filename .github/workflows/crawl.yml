name: Daily Job Crawl

on:
  schedule:
    # 02:00 IST = 20:30 UTC (previous day)
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated company slugs to crawl (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"
        type: boolean
      dry_run_parse:
        description: "Dry run + parse 5 sample JDs and print structured output"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    name: "Crawl all (sequential)"
    runs-on: ubuntu-latest
    # Single sequential job. All 18 companies are crawled one at a time in
    # the same runner. The previous 5-group parallel matrix hammered Gemini
    # concurrently and exhausted the free-tier RPM/RPD within minutes.
    # Trade-off: longer wall-clock (2-4 hrs typical), but stays within
    # Gemini rate limits on the free tier and avoids the cold-start cost
    # of 5 separate runners. Public repo → Actions minutes are unlimited.
    timeout-minutes: 350    # ~5h 50m — GH Actions hard ceiling is 6h
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @prodmatch/crawler exec playwright install --with-deps chromium

      - name: Run crawler (sequential, all companies)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Comma-separated keys → round-robin in worker pool, separate
          # daily quota per key.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          SLUGS="${{ github.event.inputs.slugs }}"
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          if [ "${{ github.event.inputs.dry_run_parse }}" = "true" ]; then
            FLAGS="--dry-run-parse"
          fi
          # Empty SLUGS means "all companies in sequence" (default).
          if [ -z "$SLUGS" ]; then
            pnpm --filter @prodmatch/crawler start -- $FLAGS
          else
            pnpm --filter @prodmatch/crawler start -- --slugs="$SLUGS" $FLAGS
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: crawl-logs
          path: |
            packages/crawler/*.log
          retention-days: 7
          if-no-files-found: ignore

  # Phase K — fan-out matching. Runs after every crawl group finishes
  # (success or failure — even partial new jobs deserve to be matched).
  # Loops the recompute endpoint until it reports zero remaining users
  # OR the wall-clock budget hits.
  recompute_matches:
    name: "Recompute matches (fan-out)"
    needs: crawl
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ always() && github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run_parse != 'true' }}
    steps:
      - name: Trigger recompute-matches for all consented users
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::APP_URL or CRON_SECRET missing — skipping recompute"
            exit 0
          fi
          MAX_ITER=10
          iter=0
          while [ $iter -lt $MAX_ITER ]; do
            iter=$((iter + 1))
            resp=$(curl -sS -X POST "${APP_URL}/api/cron/recompute-matches" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 280)
            echo "iter=$iter $resp"
            bailed=$(echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('bailed_on_budget', False))" 2>/dev/null || echo "False")
            processed=$(echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('processed', 0))" 2>/dev/null || echo "0")
            if [ "$bailed" != "True" ]; then
              echo "Recompute fan-out complete."
              break
            fi
            if [ "$processed" = "0" ]; then
              echo "::warning::No progress — stopping (response above)"
              exit 0
            fi
            sleep 2
          done
