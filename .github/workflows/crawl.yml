name: Daily Job Crawl

on:
  schedule:
    # 02:00 IST = 20:30 UTC (previous day)
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated company slugs to crawl (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"
        type: boolean
      dry_run_parse:
        description: "Dry run + parse 5 sample JDs and print structured output"
        required: false
        default: "false"
        type: boolean

# Tight token scope. The crawler only reads the repo; granting `contents: read`
# means a compromised dependency cannot write to issues/PRs/packages.
permissions:
  contents: read

# QA fix (B22): allow a newly-dispatched crawl to cancel a stalled prior run.
# We hold a Postgres cron lock during recompute, so the cancellation can't
# cause overlapping writes. With cancel-in-progress=false we observed runs
# queueing for hours when GitHub's scheduler lagged.
concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  validate:
    name: "Validate secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check required secrets are present
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=()
          [ -n "$SUPABASE_URL" ]              || missing+=("SUPABASE_URL")
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [ -n "$GEMINI_API_KEY" ]            || missing+=("GEMINI_API_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Set them in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "All required secrets present."

  crawl:
    name: "Crawl ${{ matrix.group.name }}"
    runs-on: ubuntu-latest
    needs: validate
    # Product fix: parallel-by-domain matrix (3 groups). The earlier 5-group
    # split hammered Gemini's free tier, but now we have 16 LLM providers +
    # dead-key persistence + per-key rotation, so concurrent groups can fail
    # over instead of stalling. Tail latency drops from ~4 hr (sequential)
    # to ~80 min (worst-of-three-groups) while staying within free quotas.
    #
    # Group composition:
    #   - html_heavy: Playwright-driven DOM scrapes — the slow ones
    #   - api_global: FAANG / global product cos with JSON APIs
    #   - api_india:  India product cos with JSON APIs
    #
    # If one group exhausts its provider pool, fail-fast=false keeps the
    # others running so partial inventory still lands in jobs table.
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        group:
          - name: html_heavy
            slugs: google,apple,zerodha,zomato,sap-labs
          - name: api_global
            slugs: microsoft,meta,amazon,atlassian,nvidia,oracle,salesforce
          - name: api_india
            slugs: razorpay,phonepe,cred,groww,swiggy,flipkart
    timeout-minutes: 120    # per group; was 350 wall-clock for the whole run
    env:
      # Surfaces as `runId` in every structured log line emitted by the crawler.
      # Lets us correlate crawl_runs rows with the originating workflow.
      CRAWL_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.group.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install jq (used by the recompute step)
        run: sudo apt-get update && sudo apt-get install -y jq

      # Wrap dependency install with retry — npm registry / pnpm lockfile
      # occasionally flakes and a single retry costs us nothing.
      - name: Install dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 20
          command: pnpm --filter @prodmatch/crawler exec playwright install --with-deps chromium

      - name: Run crawler for this group
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Comma-separated keys → round-robin in worker pool, separate
          # daily quota per key.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional — Slack/Discord webhook for crawl-drift alerts. No-op
          # when unset, but recommended for production.
          CRAWL_ALERT_WEBHOOK_URL: ${{ secrets.CRAWL_ALERT_WEBHOOK_URL }}
        run: |
          GROUP_SLUGS="${{ matrix.group.slugs }}"
          INPUT_SLUGS="${{ github.event.inputs.slugs }}"
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          if [ "${{ github.event.inputs.dry_run_parse }}" = "true" ]; then
            FLAGS="--dry-run-parse"
          fi

          # If the operator supplied --slugs via workflow_dispatch, narrow this
          # group to the intersection. Empty input means "run all of this group".
          if [ -z "$INPUT_SLUGS" ]; then
            SLUGS="$GROUP_SLUGS"
          else
            # Comma-separated intersection in pure shell.
            SLUGS=""
            IFS=',' read -ra REQUESTED <<< "$INPUT_SLUGS"
            IFS=',' read -ra OWNED <<< "$GROUP_SLUGS"
            for r in "${REQUESTED[@]}"; do
              for o in "${OWNED[@]}"; do
                if [ "$r" = "$o" ]; then SLUGS="$SLUGS,$o"; fi
              done
            done
            SLUGS="${SLUGS#,}"
          fi

          if [ -z "$SLUGS" ]; then
            echo "No slugs for group ${{ matrix.group.name }} (operator filter excluded all). Skipping."
            exit 0
          fi

          echo "Group ${{ matrix.group.name }} running: $SLUGS"
          pnpm --filter @prodmatch/crawler start -- --slugs="$SLUGS" $FLAGS

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          # Each matrix leg writes a distinct artifact name to avoid collisions.
          name: crawl-logs-${{ matrix.group.name }}
          path: |
            packages/crawler/*.log
          retention-days: 7
          if-no-files-found: ignore

  # Phase K — fan-out matching. Runs after the crawl finishes (success or
  # failure — even partial new jobs deserve to be matched). Loops the
  # recompute endpoint until it reports zero remaining users OR the wall-
  # clock budget hits.
  recompute_matches:
    name: "Recompute matches (fan-out)"
    needs: [validate, crawl]
    runs-on: ubuntu-latest
    timeout-minutes: 90    # Allows up to MAX_ITER=30 iterations
    # QA fix (B20) + product fix: don't recompute when secrets validation
    # fails. With the parallel matrix, `crawl.result` is "success" only if
    # every group succeeded — treat "failure" the same as "success" for
    # the purpose of recompute, because partial new jobs from 2-of-3 groups
    # is still worth matching. Only "skipped" / "cancelled" suppress this.
    if: >-
      ${{
        always()
        && needs.validate.result == 'success'
        && needs.crawl.result != 'skipped'
        && needs.crawl.result != 'cancelled'
        && github.event.inputs.dry_run != 'true'
        && github.event.inputs.dry_run_parse != 'true'
      }}
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Trigger recompute-matches for all consented users
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::APP_URL or CRON_SECRET missing — skipping recompute"
            exit 0
          fi
          MAX_ITER=30
          iter=0
          conflict_streak=0
          while [ $iter -lt $MAX_ITER ]; do
            iter=$((iter + 1))
            http_code=$(curl -sS -o /tmp/recompute-resp.json -w "%{http_code}" \
              -X POST "${APP_URL}/api/cron/recompute-matches" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 280)
            resp=$(cat /tmp/recompute-resp.json)
            echo "iter=$iter http=$http_code $resp"

            # 409 = another recompute holds the lock. Back off and retry —
            # but give up after 3 consecutive 409s (lock is stuck).
            if [ "$http_code" = "409" ]; then
              conflict_streak=$((conflict_streak + 1))
              if [ $conflict_streak -ge 3 ]; then
                echo "::warning::3 consecutive 409s — lock appears stuck; bailing"
                exit 0
              fi
              echo "  lock held, sleeping 60s before retry"
              sleep 60
              continue
            fi
            conflict_streak=0

            if [ "$http_code" != "200" ]; then
              echo "::warning::Recompute returned $http_code — bailing"
              exit 0
            fi

            bailed=$(echo "$resp" | jq -r '.bailed_on_budget // false')
            processed=$(echo "$resp" | jq -r '.processed // 0')
            remaining=$(echo "$resp" | jq -r '.remaining // 0')

            if [ "$bailed" != "true" ] && [ "$remaining" = "0" ]; then
              echo "Recompute fan-out complete."
              break
            fi
            if [ "$processed" = "0" ] && [ "$bailed" = "true" ]; then
              echo "::warning::No progress (bailed=true, processed=0) — stopping"
              exit 0
            fi
            # Brief pause between iterations so the next call hits a clean
            # lock window (the prior caller releases on response).
            sleep 5
          done
