name: Daily Job Crawl

on:
  schedule:
    # 02:00 IST = 20:30 UTC (previous day)
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      slugs:
        description: "Comma-separated company slugs to crawl (leave empty for all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no DB writes)"
        required: false
        default: "false"
        type: boolean
      dry_run_parse:
        description: "Dry run + parse 5 sample JDs and print structured output"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    name: "Crawl ${{ matrix.name }}"
    runs-on: ubuntu-latest
    # Each group is sized so it fits comfortably under 90 min including
    # detail-page enrichment + Gemini parse + embed. The previous 3-group
    # split hit 2h timeout because group-a's amazon (~2k listings) plus
    # google's 370 detail-page fetches shared the same job.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # amazon alone — ~2k jobs, listing has full descriptions, no
          # detail-page fetch needed; bottleneck is the Gemini parse step.
          - name: "amazon"
            slugs: "amazon"
          # google + microsoft — both heavy on detail-page enrichment.
          - name: "google-microsoft"
            slugs: "google,microsoft"
          # meta + apple + atlassian + salesforce — Workday-style heavy
          # enrich, smaller listing counts.
          - name: "meta-apple-atlassian-salesforce"
            slugs: "meta,apple,atlassian,salesforce"
          # nvidia + oracle + sap-labs — Workday/SAP enrich.
          - name: "nvidia-oracle-sap"
            slugs: "nvidia,oracle,sap-labs"
          # Greenhouse / Zoho / TurboHire — listing-rich, fast adapters.
          - name: "in-startups"
            slugs: "razorpay,phonepe,zerodha,cred,groww,swiggy,zomato,flipkart"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @prodmatch/crawler exec playwright install --with-deps chromium

      - name: Run crawler (with inline JD parse + embed)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Comma-separated keys → round-robin in worker pool, separate
          # daily quota per key.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          SLUGS="${{ github.event.inputs.slugs }}"
          if [ -z "$SLUGS" ]; then
            SLUGS="${{ matrix.slugs }}"
          fi
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          if [ "${{ github.event.inputs.dry_run_parse }}" = "true" ]; then
            FLAGS="--dry-run-parse"
          fi
          pnpm --filter @prodmatch/crawler start -- --slugs="$SLUGS" $FLAGS

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: crawl-logs-${{ matrix.name }}
          path: |
            packages/crawler/*.log
          retention-days: 7
          if-no-files-found: ignore

  # Safety-net pass against the deployed Vercel endpoint. Inline parse
  # during the crawl handles 99% of jobs; this catches the rare row where
  # all keys 429'd in the same run, or pre-Phase-J legacy rows. Bounded
  # iterations + small batches → finishes in minutes when there's anything
  # to do, exits immediately when there isn't.
  jd_parse_safety_net:
    name: "Parse JDs (safety net)"
    needs: crawl
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.inputs.dry_run != 'true' && github.event.inputs.dry_run_parse != 'true' }}
    steps:
      - name: Catch any rows the inline parse missed
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::warning::APP_URL or CRON_SECRET missing — skipping safety-net pass"
            exit 0
          fi

          MAX_ITER=20
          iter=0
          while [ $iter -lt $MAX_ITER ]; do
            iter=$((iter + 1))
            resp=$(curl -sS -X POST "${APP_URL}/api/admin/parse-jds" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              --max-time 280)
            echo "iter=$iter $resp"
            remaining=$(echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('remaining', -1))" 2>/dev/null || echo "-1")
            processed=$(echo "$resp" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('processed', 0))" 2>/dev/null || echo "0")
            if [ "$remaining" = "0" ]; then
              echo "Safety-net pass clean."
              break
            fi
            if [ "$processed" = "0" ]; then
              echo "::warning::No progress — stopping (response above)"
              exit 0
            fi
            sleep 2
          done
